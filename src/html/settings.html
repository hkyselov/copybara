    <div class="setting_wrapper">
      <div id="general">
        <div class="no-drag section">
          <label>Open at Login</label>
          <label class="switch">
            <input type="checkbox" value="openAtLogin" />
            <span class="slider round"></span>
          </label>
        </div>

        <div class="no-drag section">
          <label>Paste selected clip into active app</label>
          <label class="switch">
            <input type="checkbox" value="pasteOnSelect" />
            <span class="slider round"></span>
          </label>
        </div>

        <div class="no-drag section">
          <div>
            <label>Auto hide window if inactive</label>
            <select class="number-input" name="delay" id="autohide-delay">
              <option value="0.5">0.5sec</option>
              <option value="1" selected>1sec</option>
              <option value="2">2sec</option>
              <option value="3">3sec</option>
              <option value="5">5sec</option>
              <option value="10">10sec</option>
              <option value="30">30sec</option>
              <option value="60">1min</option>
              <option value="120">2min</option>
              <option value="180">3min</option>
            </select>
          </div>
          <label class="switch">
            <input type="checkbox" value="autoHideWindow" />
            <span class="slider round"></span>
          </label>
        </div>

        <div class="no-drag section">
          <label>Open clipboard</label>
          <div class="shortcutWrapper">
            <input id="shortcut" type="text" placeholder="Record Shortcut" />
            <button class="deleteShortcut">

                class="iconImg"
                fill="currentColor"
                xmlns="http://www.w3.org/2000/svg"

              </svg>
            </button>
          </div>
        </div>

        <div class="no-drag restore_wrapper">
          <button class="restore">Restore to default</button>
        </div>
      </div>
